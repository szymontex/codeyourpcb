<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeYourPCB Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #toolbar {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 8px 16px;
      display: flex;
      gap: 16px;
      align-items: center;
    }
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #pcb-canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
    #status {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(255,255,255,0.9);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #error-badge {
      background: #dc3545;
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      cursor: pointer;
    }
    #error-badge:hover {
      background: #c82333;
    }
    #error-badge.hidden {
      display: none;
    }
    /* Error panel (VS Code style) */
    #error-panel {
      position: absolute;
      bottom: 40px;
      left: 8px;
      width: 350px;
      max-height: 200px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    #error-panel.hidden {
      display: none;
    }
    #error-panel-header {
      padding: 8px 12px;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 500;
    }
    #error-panel-close {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #666;
    }
    #error-panel-close:hover {
      color: #333;
    }
    #error-list {
      overflow-y: auto;
      max-height: 160px;
    }
    .error-item {
      padding: 8px 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      font-size: 12px;
    }
    .error-item:hover {
      background: #f8f8f8;
    }
    .error-item:last-child {
      border-bottom: none;
    }
    .error-kind {
      color: #dc3545;
      font-weight: 500;
    }
    .error-message {
      color: #333;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <span>Layers:</span>
    <label><input type="checkbox" id="layer-top" checked> Top</label>
    <label><input type="checkbox" id="layer-bottom" checked> Bottom</label>
    <span id="coords"></span>
  </div>
  <div id="canvas-container">
    <canvas id="pcb-canvas"></canvas>
    <div id="status">
      <span id="status-text">Loading...</span>
      <span id="error-badge" class="hidden"><span id="error-count">0</span> errors</span>
    </div>
    <!-- Error panel (VS Code style - appears on badge click) -->
    <div id="error-panel" class="hidden">
      <div id="error-panel-header">
        <span>DRC Errors</span>
        <button id="error-panel-close">&times;</button>
      </div>
      <div id="error-list"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
