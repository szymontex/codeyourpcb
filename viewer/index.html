<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>CodeYourPCB Viewer</title>
  <script>
    // FART prevention: Flash of inAccurate coloR Theme
    // Set theme BEFORE CSS loads to prevent flash of wrong theme
    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : (systemPrefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background-color 0.15s ease, color 0.15s ease;
    }
    label {
      color: var(--text-primary);
    }
    #toolbar {
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border-primary);
      padding: 8px 16px;
      display: flex;
      gap: 16px;
      align-items: center;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }
    #toolbar .separator {
      color: var(--text-tertiary);
      margin: 0 -8px;
    }
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #pcb-canvas {
      position: absolute;
      top: 0;
      left: 0;
      touch-action: none;
    }
    #status {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: var(--status-bg);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background-color 0.15s ease, color 0.15s ease;
    }
    #error-badge {
      background: var(--error);
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      cursor: pointer;
    }
    #error-badge:hover {
      filter: brightness(0.85);
    }
    #error-badge.hidden {
      display: none;
    }
    /* Error panel (VS Code style) */
    #error-panel {
      position: absolute;
      bottom: 40px;
      left: 8px;
      width: 350px;
      max-height: 200px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-primary);
      border-radius: 4px;
      box-shadow: 0 2px 8px var(--shadow);
      overflow: hidden;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }
    #error-panel.hidden {
      display: none;
    }
    #error-panel-header {
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-primary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 500;
    }
    #error-panel-close {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--text-secondary);
    }
    #error-panel-close:hover {
      color: var(--text-primary);
    }
    #error-list {
      overflow-y: auto;
      max-height: 160px;
    }
    .error-item {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-secondary);
      cursor: pointer;
      font-size: 12px;
    }
    .error-item:hover {
      background: var(--bg-secondary);
    }
    .error-item:last-child {
      border-bottom: none;
    }
    .error-kind {
      color: var(--error);
      font-weight: 500;
    }
    .error-message {
      color: var(--text-primary);
    }
    /* Open button */
    #open-btn {
      background: var(--accent-primary);
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    #open-btn:hover {
      background: var(--accent-hover);
    }
    /* Route button */
    #route-btn {
      background: var(--success);
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-left: auto;
    }
    #route-btn:hover {
      filter: brightness(0.85);
    }
    #route-btn:disabled {
      background: var(--text-tertiary);
      cursor: not-allowed;
    }
    #route-btn.routing {
      background: var(--warning);
      color: var(--bg-primary);
    }
    /* Cancel button */
    #cancel-route-btn {
      background: var(--error);
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    #cancel-route-btn:hover {
      filter: brightness(0.85);
    }
    #cancel-route-btn.hidden {
      display: none;
    }
    /* Coords display - fixed width to prevent layout shift */
    #coords {
      min-width: 160px;
      font-size: 12px;
      color: var(--text-secondary);
      text-align: right;
    }
    /* Theme toggle button */
    #theme-toggle {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: background-color 0.15s;
    }
    #theme-toggle:hover {
      background: var(--border-primary);
    }
    #theme-toggle:focus-visible {
      outline: 2px solid var(--accent-primary);
      outline-offset: 2px;
    }
    /* Auto-route toggle */
    #auto-route-label {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    /* Routing status */
    #routing-status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--status-bg);
      padding: 16px 24px;
      border-radius: 8px;
      box-shadow: 0 4px 16px var(--shadow);
      text-align: center;
      z-index: 100;
      transition: background-color 0.15s ease, color 0.15s ease;
    }
    #routing-status.hidden {
      display: none;
    }
    #routing-status h3 {
      margin-bottom: 8px;
      font-size: 14px;
    }
    #routing-progress {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border-secondary);
      border-top: 2px solid var(--success);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    /* Drag-over visual feedback */
    #canvas-container.drag-over {
      outline: 3px dashed var(--success);
      outline-offset: -3px;
      background: rgba(40, 167, 69, 0.05);
    }
    #drop-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: var(--success);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #canvas-container.drag-over #drop-hint {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <span>Layers:</span>
    <label><input type="checkbox" id="layer-top" checked> Top</label>
    <label><input type="checkbox" id="layer-bottom" checked> Bottom</label>
    <span class="separator">|</span>
    <label><input type="checkbox" id="layer-ratsnest" checked> Ratsnest</label>
    <span class="separator">|</span>
    <button id="theme-toggle" aria-label="Toggle theme" title="Toggle theme (Light / Dark / Auto)">
      <span id="theme-icon">☀️</span>
    </button>
    <span id="coords"></span>
    <button id="open-btn">Open</button>
    <label id="auto-route-label"><input type="checkbox" id="auto-route"> Auto-route</label>
    <button id="route-btn">Route</button>
    <button id="cancel-route-btn" class="hidden">Cancel</button>
  </div>
  <div id="canvas-container">
    <canvas id="pcb-canvas"></canvas>
    <div id="drop-hint">Drop .cypcb or .ses file</div>
    <div id="status">
      <span id="status-text">Loading...</span>
      <span id="error-badge" class="hidden"><span id="error-count">0</span> errors</span>
    </div>
    <!-- Routing status overlay -->
    <div id="routing-status" class="hidden">
      <h3><span class="spinner"></span>Routing...</h3>
      <div id="routing-progress">Initializing...</div>
    </div>
    <!-- Error panel (VS Code style - appears on badge click) -->
    <div id="error-panel" class="hidden">
      <div id="error-panel-header">
        <span>DRC Errors</span>
        <button id="error-panel-close">&times;</button>
      </div>
      <div id="error-list"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
